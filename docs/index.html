<!doctype html>
<html lang="pt-BR" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2026be" />
    <title>doc-template-engine</title>
    <meta
      name="description"
      content="Motor de prompts e templates do framework doc-template — especificação de software em quatro níveis (N0 → N3)."
    />
    <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Syntax highlighting themes (toggled by JS) -->
    <link
      rel="stylesheet"
      id="hljs-light"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css"
    />
    <link
      rel="stylesheet"
      id="hljs-dark"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
      disabled
    />

    <link rel="stylesheet" href="assets/css/styles.css" />

    <!-- Set theme before paint to avoid flash -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("doku-theme") || "system";
          var dark =
            t === "dark" ||
            (t === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.setAttribute(
            "data-theme",
            dark ? "dark" : "light"
          );
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div class="app">
      <!-- ===== Sidebar ===== -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar__brand">
          <a class="brand" href="#/" aria-label="Início">
            <img class="brand__logo" src="assets/img/logo.svg" alt="" />
            <span class="brand__name" id="brandName">doc-template</span>
          </a>
        </div>

        <div class="sidebar__search">
          <div class="search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7" /><path d="m21 21-4.3-4.3" /></svg>
            <input
              id="search"
              type="search"
              placeholder="Buscar na documentação"
              autocomplete="off"
              aria-label="Buscar"
            />
            <kbd>/</kbd>
          </div>
        </div>

        <nav class="nav" id="nav" aria-label="Navegação"></nav>

        <div class="sidebar__footer">
          <a
            class="workspace"
            id="repoLink"
            href="https://github.com/andromarcio/doc-template-engine"
            target="_blank"
            rel="noopener"
          >
            <span class="workspace__badge">dt</span>
            <span class="workspace__name">andromarcio/doc-template-engine</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 15 5 5 5-5M7 9l5-5 5 5"/></svg>
          </a>
        </div>
      </aside>

      <!-- ===== Main ===== -->
      <div class="main">
        <header class="topbar">
          <button class="icon-btn menu" id="menuToggle" aria-label="Menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
          </button>

          <nav class="breadcrumb" id="breadcrumb" aria-label="Trilha"></nav>

          <div class="topbar__actions">
            <div class="theme-switch" role="group" aria-label="Tema">
              <button data-theme-set="system" title="Sistema" aria-label="Tema do sistema">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
              </button>
              <button data-theme-set="light" title="Claro" aria-label="Tema claro">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
              </button>
              <button data-theme-set="dark" title="Escuro" aria-label="Tema escuro">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>
              </button>
            </div>

            <a
              class="btn btn--primary"
              href="https://github.com/andromarcio/doc-template-engine"
              target="_blank"
              rel="noopener"
            >
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.58 2 12.25c0 4.53 2.87 8.37 6.84 9.73.5.1.68-.22.68-.49 0-.24-.01-.88-.01-1.73-2.78.62-3.37-1.21-3.37-1.21-.46-1.18-1.11-1.49-1.11-1.49-.91-.64.07-.62.07-.62 1 .07 1.53 1.05 1.53 1.05.89 1.56 2.34 1.11 2.91.85.09-.66.35-1.11.63-1.37-2.22-.26-4.56-1.14-4.56-5.06 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.71 0 0 .84-.27 2.75 1.05a9.4 9.4 0 0 1 5 0c1.91-1.32 2.75-1.05 2.75-1.05.55 1.41.2 2.45.1 2.71.64.72 1.03 1.63 1.03 2.75 0 3.93-2.34 4.79-4.57 5.05.36.32.68.94.68 1.9 0 1.37-.01 2.48-.01 2.82 0 .27.18.6.69.49A10.26 10.26 0 0 0 22 12.25C22 6.58 17.52 2 12 2Z"/></svg>
              <span class="btn__label">GitHub</span>
            </a>
          </div>
        </header>

        <div class="content-wrap">
          <article class="content" id="content">
            <div class="state">
              <div class="skeleton" style="width: 50%; height: 30px"></div>
              <div class="skeleton" style="width: 90%"></div>
              <div class="skeleton" style="width: 80%"></div>
              <div class="skeleton" style="width: 85%"></div>
            </div>
          </article>

          <aside class="toc" id="toc" aria-label="Nesta página"></aside>
        </div>
      </div>
    </div>

    <div class="backdrop" id="backdrop"></div>

    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <!-- Site config + app -->
    <script src="config.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
