name: Esteira de gates — check

# Valida, em cada Pull Request, que nenhum checkpoint foi pulado e que a
# transição de estado é legal (a próxima etapa só após a aprovação da anterior).
# Torne este check obrigatório no branch protection da `main`.

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base
        run: git fetch --no-tags --prune origin "+refs/heads/${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Dependências
        run: pip install pyyaml

      - name: Validar transições de gate
        run: python scripts/gates.py check --base "origin/${{ github.base_ref }}"
